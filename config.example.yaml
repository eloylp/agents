# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
log:
  level: info    # trace, debug, info, warn, error, fatal
  format: text   # text (human-readable) or json (structured)

# ──────────────────────────────────────────────
# HTTP server — webhook ingestion + health check
# ──────────────────────────────────────────────
http:
  listen_addr: ":8080"
  status_path: /status
  webhook_path: /webhooks/github
  read_timeout_seconds: 15
  write_timeout_seconds: 15
  idle_timeout_seconds: 60
  max_body_bytes: 1048576               # 1 MiB cap on webhook payloads
  webhook_secret_env: GITHUB_WEBHOOK_SECRET  # env var holding the HMAC shared secret
  api_key_env: AGENTS_API_KEY           # env var holding Bearer token for POST /agents/run
  delivery_ttl_seconds: 3600            # how long to remember delivery IDs for dedup
  shutdown_timeout_seconds: 15          # grace period for in-flight work on SIGTERM

# ──────────────────────────────────────────────
# Internal event queues (webhook → processor)
# ──────────────────────────────────────────────
processor:
  issue_queue_buffer: 256
  pr_queue_buffer: 256
  # Maximum number of agent goroutines that may run concurrently for a single
  # PR-review fan-out event. Limits subprocess resource usage when many agents
  # are configured and ai:review (agent=all) labels are used frequently.
  # Default: 4. Must be >= 1.
  max_concurrent_agents: 4

# ──────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────
agents_dir: "./agents"                  # base directory for prompt templates and skill guidance files
memory_dir: "/var/lib/agents/memory"    # persistent memory root for autonomous agents

# ──────────────────────────────────────────────
# Base prompt templates
#
# Each entry can use either:
#   prompt:      inline text (Go template syntax)
#   prompt_file: path relative to agents_dir
#
# Templates use {{.Field}} placeholders filled at
# runtime and {{template "agent_guidance" .}} to
# inject the composed skill guidance for the agent.
# ──────────────────────────────────────────────
prompts:
  issue_refinement:
    prompt: |
      Refine issue #{{.Number}} in {{.Repo}}.
      Post exactly one concise GitHub comment with: feasibility, approach, acceptance criteria, and open questions.
      Return one JSON object on stdout.
  pr_review:
    prompt: |
      {{.AgentHeading}}
      Review PR #{{.Number}} in {{.Repo}} from the perspective of {{.Agent}}.
      {{template "agent_guidance" .}}
      Post one high-signal review comment and return one JSON object on stdout.
  autonomous:
    prompt: |
      Autonomous run for {{.Repo}} as {{.AgentName}}.
      Focus: {{.Description}}
      Task: {{.Task}}
      Memory file: {{.MemoryPath}}
      Existing memory:
      {{.Memory}}
      {{template "agent_guidance" .}}
      Return one JSON object on stdout.

# ──────────────────────────────────────────────
# Skills — reusable knowledge clusters
#
# A skill defines domain-specific guidance that is
# injected into prompt templates. Skills can be
# composed: an agent referencing [architect, security]
# receives the concatenated guidance from both.
#
# Use prompt_file (relative to agents_dir) for longer
# guidance, or inline prompt for short directives.
# ──────────────────────────────────────────────
skills:
  - name: architect
    prompt: |
      Focus on architecture boundaries, coupling, extensibility, and maintainability risks.
  - name: security
    prompt: |
      Focus on authn/authz, secrets exposure, injection vectors, and unsafe defaults.
  - name: testing
    prompt: |
      Focus on missing tests, brittle tests, regression coverage, and testability.
  - name: devops
    prompt: |
      Focus on reliability, deployment safety, observability, and operational simplicity.
  - name: ux
    prompt: |
      Focus on clarity, accessibility, copy quality, and user flow friction.

# ──────────────────────────────────────────────
# Agents — actors that compose skills
#
# Each agent has a name (used in GitHub labels like
# ai:review:claude:<agent>) and references one or
# more skills whose guidance is merged at runtime.
# ──────────────────────────────────────────────
agents:
  - name: arch-reviewer
    skills: [architect]
  - name: sec-reviewer
    skills: [security]
  - name: test-reviewer
    skills: [testing]
  - name: ops-reviewer
    skills: [devops]
  - name: ux-reviewer
    skills: [ux]

# ──────────────────────────────────────────────
# AI backends — CLI tools used to run prompts
#
# Supported backends: claude, codex.
# When no explicit backend is specified in a label,
# claude is preferred over codex if both are configured.
# ──────────────────────────────────────────────
ai_backends:
  claude:
    mode: command
    command: claude
    args:
      - "-p"
      - "--dangerously-skip-permissions"
    timeout_seconds: 600
    max_prompt_chars: 12000
    redaction_salt_env: LOG_SALT
  codex:
    mode: command
    command: codex
    args:
      - "exec"
      - "--skip-git-repo-check"
      - "--dangerously-bypass-approvals-and-sandbox"
    timeout_seconds: 600
    max_prompt_chars: 12000
    redaction_salt_env: LOG_SALT

# ──────────────────────────────────────────────
# Repositories — repos this daemon handles
# ──────────────────────────────────────────────
repos:
  - full_name: "owner/repo"
    enabled: true

# ──────────────────────────────────────────────
# Autonomous agents — cron-scheduled sweeps
#
# Each autonomous agent defines its own skills and
# tasks. Tasks run sequentially on each cron trigger;
# the agent receives persistent memory across runs.
#
# backend: auto | claude | codex
#   "auto" picks the default configured backend.
# ──────────────────────────────────────────────
autonomous_agents:
  - repo: "owner/repo"
    enabled: true
    agents:
      - name: "codebase-scout"
        description: "Architecture sweeps looking for design drift and risky coupling."
        cron: "0 9 * * *"
        backend: "auto"
        skills: [architect]
        tasks:
          - name: "issues"
            prompt: |
              Scan all open issues and add one succinct comment per issue only if this agent has not commented before. Avoid duplicate comments.
          - name: "code"
            prompt: |
              Inspect the codebase for improvements. If changes are large or uncertain, open an issue describing them. If changes are small and high-confidence, describe the diff in an issue but do not open a PR.
