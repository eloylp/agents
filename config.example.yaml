log:
  level: info
  format: text

http:
  listen_addr: ":8080"
  status_path: /status
  webhook_path: /webhooks/github
  read_timeout_seconds: 15
  write_timeout_seconds: 15
  idle_timeout_seconds: 60
  max_body_bytes: 1048576
  webhook_secret_env: GITHUB_WEBHOOK_SECRET
  delivery_ttl_seconds: 3600
  shutdown_timeout_seconds: 15

processor:
  issue_queue_buffer: 256
  pr_queue_buffer: 256

agents_dir: "./agents"
allow_autonomous_prs: false

ai_backends:
  claude:
    mode: command
    command: claude
    args:
      - "-p"
      - "--dangerously-skip-permissions"
    timeout_seconds: 600
    max_prompt_chars: 12000
    redaction_salt_env: LOG_SALT
    agents: [architect, security, testing, devops, ux]
  codex:
    mode: command
    command: codex
    args:
      - "-p"
    timeout_seconds: 600
    max_prompt_chars: 12000
    redaction_salt_env: LOG_SALT
    agents: [architect, security, testing, devops, ux]

repos:
  - full_name: "owner/repo"
    enabled: true

autonomous_agents:
  - repo: "owner/repo"
    enabled: true
    agents:
      - name: "architect"
        description: "Architecture sweeps looking for design drift and risky coupling."
        cron: "0 9 * * *"
