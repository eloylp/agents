# ──────────────────────────────────────────────
# daemon — how the service runs
# ──────────────────────────────────────────────
daemon:
  log:
    level: info           # trace, debug, info, warn, error, fatal
    format: text          # text or json

  http:
    listen_addr: ":8080"
    status_path: /status
    webhook_path: /webhooks/github
    agents_run_path: /agents/run
    webhook_secret_env: GITHUB_WEBHOOK_SECRET   # HMAC shared secret env var
    api_key_env: AGENTS_API_KEY                 # Bearer token for /agents/run
    read_timeout_seconds: 15
    write_timeout_seconds: 15
    idle_timeout_seconds: 60
    max_body_bytes: 1048576                     # 1 MiB cap on webhook payloads
    delivery_ttl_seconds: 3600                  # dedupe window for webhook IDs
    shutdown_timeout_seconds: 15

  processor:
    issue_queue_buffer: 256
    pr_queue_buffer: 256
    max_concurrent_agents: 4                    # per-PR fan-out cap

  memory_dir: /var/lib/agents/memory            # persistent agent memory root

  ai_backends:
    claude:
      command: claude
      args:
        - "-p"
        - "--dangerously-skip-permissions"
      timeout_seconds: 1500
      max_prompt_chars: 12000
      redaction_salt_env: LOG_SALT

    codex:
      command: codex
      args:
        - "exec"
        - "--skip-git-repo-check"
        - "--dangerously-bypass-approvals-and-sandbox"
      timeout_seconds: 600
      max_prompt_chars: 12000
      redaction_salt_env: LOG_SALT

# ──────────────────────────────────────────────
# skills — reusable guidance blocks
#
# Each skill is a named chunk of guidance. Agents reference skills by
# name; at runtime the guidance is concatenated into the agent's prompt.
# ──────────────────────────────────────────────
skills:
  architect:
    prompt: |
      Focus on architecture boundaries, coupling, extensibility, and maintainability risks.

  security:
    prompt: |
      Focus on authn/authz, secrets exposure, injection vectors, and unsafe defaults.

  testing:
    prompt: |
      Focus on missing tests, brittle tests, regression coverage, and testability.

  devops:
    prompt: |
      Focus on reliability, deployment safety, observability, and operational simplicity.

  dx:
    prompt: |
      Focus on developer experience: config ergonomics, error clarity, onboarding friction, documentation accuracy.

  product:
    prompt: |
      Focus on product-market fit: user value, competitive positioning, feature gaps vs bloat, adoption friction.

# ──────────────────────────────────────────────
# agents — named capabilities
#
# Each agent is a capability definition: a name, a backend, the skills
# it uses, and a prompt. Agents don't run on their own — repos below
# decide when and where they run.
#
# backend: auto | claude | codex   ("auto" picks the default)
# allow_prs: false (default) | true
#   When false the scheduler prepends a hard "do not open PRs" instruction
#   before the agent's prompt. Set to true only for agents explicitly
#   designed to open pull requests.
# prompt: inline text, OR
# prompt_file: path relative to the config file's directory
# ──────────────────────────────────────────────
agents:
  # Inline prompt — good for short, simple agents.
  - name: arch-reviewer
    backend: auto
    skills: [architect]
    prompt: |
      You are an architecture-focused PR reviewer. Post one high-signal
      review comment on the PR.

  # Prompt loaded from a file — recommended for longer prompts.
  # The path is resolved relative to the config file's directory.
  - name: sec-reviewer
    backend: auto
    skills: [security]
    prompt_file: prompts/sec-reviewer.md

  - name: test-reviewer
    backend: auto
    skills: [testing]
    prompt_file: prompts/test-reviewer.md

# ──────────────────────────────────────────────
# repos — wiring: where and when agents run
#
# Each repo lists the agents it uses and the triggers that activate
# them. An agent can be referenced multiple times with different
# triggers on the same repo.
#
# Triggers:
#   labels:    [ai:review:arch-reviewer, ...]  — GitHub label events
#   cron:      "0,15 8-18 * * *"               — time-based schedule
#   enabled:   optional, default true          — disable without deletion
# ──────────────────────────────────────────────
repos:
  - name: "owner/repo"
    enabled: true
    use:
      - agent: arch-reviewer
        labels: ["ai:review:arch-reviewer"]

      - agent: sec-reviewer
        labels: ["ai:review:sec-reviewer"]

      - agent: test-reviewer
        labels: ["ai:review:test-reviewer"]
