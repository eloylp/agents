# ──────────────────────────────────────────────
# Import-format reference
# ──────────────────────────────────────────────
# This file is a YAML import template. The daemon's source of truth is
# the SQLite store; YAML is an optional import/export format. To seed
# an empty fleet or re-import after edits, POST this file to /import.
# Exports use the workspace-aware shape:
#
#   prompts:
#     - name: coder
#       content: |
#         ...
#   workspaces:
#     - id: default
#       name: Default
#       guardrails:
#         - guardrail_name: security
#           enabled: true
#       agents:
#         - name: coder
#           prompt_ref: coder
#           scope_type: workspace
#       repos:
#         - name: owner/repo
#           use:
#             - agent: coder
#               labels: [ai ready]
#
# This example still uses the legacy top-level agents/repos form because it is
# concise for hand-authored bootstraps; import migrates those entries into the
# Default workspace and creates prompt catalog rows automatically.
# After that, manage the fleet through the /ui/ dashboard, the CRUD
# API, or the agents-fleet MCP tools.
#
# To re-seed a running daemon, POST this file at /import:
#
#   curl -X POST -H 'Content-Type: application/x-yaml' \
#     --data-binary @config.yaml http://localhost:8080/import
#
# This example is intentionally small enough to read in one pass. Start here,
# then grow the fleet in the dashboard at /ui/ or over the CRUD API.
# ──────────────────────────────────────────────

# ──────────────────────────────────────────────
# backends, AI CLI runtimes agents can use
# ──────────────────────────────────────────────
backends:
  claude:
    command: claude
    timeout_seconds: 1500
    max_prompt_chars: 12000

  codex:
    command: codex
    timeout_seconds: 600
    max_prompt_chars: 12000

# ──────────────────────────────────────────────
# skills, reusable guidance blocks
#
# Each skill is a named chunk of guidance. Agents reference skills by
# name; at runtime the guidance is concatenated into the agent's prompt.
# Skill prompts are inline strings, keep them in this YAML file or let
# the daemon manage them through the CRUD API / UI / MCP after import.
# ──────────────────────────────────────────────
skills:
  architect:
    prompt: |
      Focus on architecture boundaries, coupling, and maintainability risks.
  security:
    prompt: |
      Focus on auth, secrets handling, trust boundaries, and unsafe defaults.
  testing:
    prompt: |
      Focus on behavioral regressions, missing tests, and weak assertions.
  devops:
    prompt: |
      Focus on deployment safety, observability, and operational failure modes.
  dx:
    prompt: |
      Focus on onboarding friction, naming, docs drift, and actionable errors.
  documentation:
    prompt: |
      Keep docs accurate, easy to scan, and honest about caveats.
  product:
    prompt: |
      Translate technical findings into user-facing impact, priorities, and tradeoffs.

# ──────────────────────────────────────────────
# agents, named capabilities
#
# Each agent is a capability definition: a name, a backend, the skills
# it uses, and a prompt. Agents don't run on their own, repos
# below decide when and where they run.
#
# backend: claude | codex | claude_local
# allow_prs: false (default) | true
#   When false the scheduler prepends a hard "do not open PRs" instruction
#   before the agent's prompt. Set to true only for agents explicitly
#   designed to open pull requests (coders, refactorers).
# description: short human-readable summary of the agent's role.
#   Required for every agent. Used for UI identification and, when the agent
#   is dispatchable, inter-agent routing context in originators' rosters.
# allow_dispatch: false (default) | true
#   Opt-in gate: only agents with allow_dispatch: true can be dispatched.
# allow_memory: true (default) | false
#   Controls whether the autonomous (cron) scheduler loads existing memory
#   into the prompt and persists the agent's returned `memory` field after
#   the run. Set to false for inherently stateless autonomous agents whose
#   work is recomputed each run, so they don't waste prompt budget on
#   memory they will never use. Event-driven runs already neither load nor
#   persist memory; this toggle is a hard runtime gate that does not depend
#   on the agent's prompt cooperating.
# can_dispatch: [agent-name, ...]
#   Whitelist of agents this agent is allowed to dispatch. Entries must
#   reference real agents in this config with allow_dispatch: true;
#   self-reference is rejected.
#
# Runtime "Available experts" roster
# ──────────────────────────────────
# At render time the daemon injects an "## Available experts" section
# into every agent's prompt, listing valid targets from that agent's own
# `can_dispatch` list. A target appears only when it exists, has
# `allow_dispatch: true`. Each entry shows
# the target's name, description, skills, and a [dispatchable] marker.
#
# For example, the `pr-reviewer` agent below has `can_dispatch: [coder,
# sec-reviewer]`, so its runtime prompt includes an "## Available experts"
# section like:
#
#   ## Available experts
#
#   - coder [dispatchable]
#     Implements fixes and features; opens pull requests.
#     Skills: architect, testing
#   - sec-reviewer [dispatchable]
#     Reviews security concerns and potential vulnerabilities.
#     Skills: security
#
# The agent then references these names in its response JSON's `dispatch`
# array when it wants to invoke them. Dispatch wiring is the authority:
# the target does not need a repo binding just to receive a dispatch.
# Runtime validation drops out-of-roster dispatches with a WARN log.
# ──────────────────────────────────────────────
agents:
  # Autonomous scouts, survey the codebase and open issues for follow-up.
  - name: scout-issues
    backend: claude
    description: "Surveys the codebase for issues worth tracking in the issue tracker"
    skills: &scout-skills [architect, dx]
    prompt: |
      Inspect the repository for user-visible bugs, stale docs, or maintenance gaps.
      Open or update GitHub issues with concrete evidence and next steps.
    can_dispatch: [product-strategist]

  - name: scout-code
    backend: claude
    description: "Surveys the codebase for code-quality and architectural concerns"
    skills: *scout-skills
    prompt: |
      Inspect the codebase for architectural debt, risky complexity, and weak invariants.
      Capture findings as concrete GitHub issues with reproduction details when possible.
    can_dispatch: [product-strategist]

  # PR-authoring agents, require allow_prs: true.
  - name: coder
    backend: claude
    description: "Implements fixes and features; opens pull requests"
    skills: [architect, testing]
    prompt: |
      Implement the requested change end-to-end.
      Run the narrowest meaningful tests and open a pull request when the work is ready.
    allow_prs: true
    allow_dispatch: true    # can be dispatched by pr-reviewer on REQUEST_CHANGES
    can_dispatch: [pr-reviewer]

  - name: refactorer
    backend: claude
    description: "Refactors existing code for readability and maintainability"
    skills: [architect, testing, dx]
    prompt: |
      Refactor code for clarity and maintainability without changing behavior.
      Leave the repo in a state where tests still pass.
    allow_prs: true

  # Documentation agent, reviews code + git history, keeps docs accurate and readable.
  - name: docs-writer
    backend: claude
    description: "Keeps README, CLAUDE.md, AGENTS.md, and docs/*.md accurate and readable"
    skills: [documentation, dx]
    prompt: |
      Read the code before editing docs.
      Keep README, CLAUDE.md, AGENTS.md, and docs/*.md aligned with shipped behavior.
    allow_prs: true

  # PR-reviewing agent, comments only, no PRs (default allow_prs: false).
  - name: pr-reviewer
    backend: codex
    description: "Reviews pull requests for quality, test coverage, and correctness"
    skills: [architect, testing, security]
    prompt: |
      Review pull requests for correctness, regressions, and missing tests.
      Prefer concrete findings over broad summaries.
    allow_dispatch: true    # can be dispatched by coder when PR is ready
    can_dispatch: [coder, sec-reviewer]

  - name: product-strategist
    backend: claude
    description: "Translates technical findings into product-level insights and priorities"
    skills: [product, dx]
    # product-strategist is research-driven each run, there's no useful state to
    # carry between invocations, so disable memory load + persist to keep the
    # prompt budget focused on the current findings.
    allow_memory: false
    prompt: |
      Convert technical findings into product priorities, tradeoffs, and sequencing advice.
    allow_dispatch: true    # scouts dispatch here with product-facing findings

  # Single-axis review agents, one per skill.
  - name: arch-reviewer
    backend: claude
    description: "Reviews architecture and design decisions"
    skills: [architect]
    prompt: |
      Review the change for architecture boundaries, coupling, and long-term maintainability.

  - name: sec-reviewer
    backend: claude
    description: "Reviews security concerns and potential vulnerabilities"
    skills: [security]
    prompt: |
      Review the change for security risks, trust-boundary violations, and unsafe defaults.
    allow_dispatch: true    # pr-reviewer escalates security smells here

  - name: test-reviewer
    backend: claude
    description: "Reviews test coverage and testing strategy"
    skills: [testing]
    prompt: |
      Review the change for missing tests, brittle assertions, and blind spots in coverage.

  - name: ops-reviewer
    backend: claude
    description: "Reviews operational concerns: CI, deployment, observability"
    skills: [devops]
    prompt: |
      Review the change for CI reliability, deploy safety, and observability gaps.

  - name: dx-reviewer
    backend: claude
    description: "Reviews developer experience: docs, tooling, onboarding"
    skills: [dx]
    prompt: |
      Review the change for onboarding friction, confusing naming, and stale documentation.

# ──────────────────────────────────────────────
# repos, wiring: where and when agents run
#
# Each binding sets exactly one trigger: labels, events, or cron.
# The same agent can appear multiple times on the same repo with different
# triggers.
# ──────────────────────────────────────────────
repos:
  - name: "owner/repo"
    enabled: true
    use:
      - agent: arch-reviewer
        labels: ["ai:review:arch-reviewer"]

      - agent: pr-reviewer
        events: ["pull_request.opened", "pull_request.synchronize"]

      - agent: coder
        events: ["issue_comment.created"]

      - agent: docs-writer
        cron: "0 6 * * *"

      - agent: coder
        cron: "0,30 8-18 * * *"
