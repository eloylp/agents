name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: build UI
        run: cd internal/ui && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: detect migration changes
        id: migration-changes
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" -- internal/store/migrations/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: migration compatibility tests
        if: github.event_name == 'pull_request' && steps.migration-changes.outputs.changed == 'true'
        run: go test ./internal/store -run 'Test(OpenAndMigrate|.*Migration.*)' -count=1

      - name: go test
        if: github.event_name == 'pull_request'
        run: go test ./... -count=1

      - name: go test race
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: go test ./... -race -count=1
