name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  RUNNER_IMAGE_NAME: ghcr.io/${{ github.repository }}-runner

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=dev-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{raw}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Docker metadata (runner)
        id: runner-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RUNNER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=dev-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{raw}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: daemon
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.runner-meta.outputs.tags }}
          labels: ${{ steps.runner-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
