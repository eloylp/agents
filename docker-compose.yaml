services:
  agents:
    image: ghcr.io/eloylp/agents:latest
    # The daemon needs Docker socket access so it can create per-run containers.
    # The published image defaults to the non-root agents user; Compose runs it
    # as root because host docker.sock group IDs are not portable.
    user: "0:0"
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/agents
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CODEX_ACCESS_TOKEN=${CODEX_ACCESS_TOKEN}
      - CODEX_API_KEY=${CODEX_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GH_HOST=${GH_HOST}
      - GITHUB_API_URL=${GITHUB_API_URL}
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    volumes:
      # SQLite database (fleet config + agent memory + observability).
      - agents-data:/var/lib/agents
      # Docker socket lets the daemon create one ephemeral runner container
      # per agent run. This is root-equivalent access to the Docker host.
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    restart: unless-stopped

volumes:
  agents-data:
