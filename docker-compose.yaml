services:
  agents:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/agents
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      # SQLite database (fleet config + agent memory + observability).
      - agents-data:/var/lib/agents
      # Claude Code / Codex auth, GitHub MCP config, and gh CLI auth.
      # Populate once via `docker compose exec -it agents agents-setup`.
      # Kept separate from agents-data so operators can rotate auth
      # (rm + re-run setup) without touching fleet state, and back up
      # fleet state without copying tokens.
      - agents-home:/home/agents
    env_file:
      - .env
    restart: unless-stopped

volumes:
  agents-data:
  agents-home:
