services:
  agents:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/agents
    volumes:
      - ./config.yaml:/etc/agents/config.yaml:ro
      - ~/.claude:/home/agents/.claude
      - ~/.codex:/home/agents/.codex
      - ~/.config/gh:/home/agents/.config/gh:ro
    env_file:
      - .env
    restart: unless-stopped
