services:
  agentd:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/agentd
    volumes:
      - ./config.yaml:/etc/agentd/config.yaml:ro
      - ~/.claude:/home/agentd/.claude
      - ~/.codex:/home/agentd/.codex
      - ~/.config/gh:/home/agentd/.config/gh:ro
    env_file:
      - .env
    restart: unless-stopped
