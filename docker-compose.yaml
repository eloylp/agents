services:
  agents:
    image: ghcr.io/eloylp/agents:latest
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/agents
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODEX_ACCESS_TOKEN=${CODEX_ACCESS_TOKEN}
      - AGENTS_RUNNER_IMAGE=${AGENTS_RUNNER_IMAGE:-ghcr.io/eloylp/agents-runner:latest}
    volumes:
      # SQLite database (fleet config + agent memory + observability).
      - agents-data:/var/lib/agents
      # Docker socket lets the daemon create one ephemeral runner container
      # per agent run. This is root-equivalent access to the Docker host.
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    restart: unless-stopped

volumes:
  agents-data:
